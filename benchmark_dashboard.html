<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CPU GPU NPU Benchmark Dashboard</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: #fffdf8;
      --ink: #1f2937;
      --muted: #6b7280;
      --cpu: #e76f51;
      --gpu: #2a9d8f;
      --npu: #264653;
      --grid: #e7dccb;
      --accent: #c08457;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, #fff7e8 0, transparent 28%),
        linear-gradient(180deg, #f7f2eb 0%, var(--bg) 100%);
      color: var(--ink);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    h1, h2 {
      margin: 0 0 12px;
      font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .hero {
      display: grid;
      gap: 16px;
      margin-bottom: 24px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(38, 70, 83, 0.08);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 14px 30px rgba(38, 70, 83, 0.06);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 8px;
    }

    .button, .file-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 10px 16px;
      border: 1px solid rgba(38, 70, 83, 0.12);
      background: white;
      color: var(--ink);
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }

    .file-label input {
      display: none;
    }

    .meta-grid, .card-grid {
      display: grid;
      gap: 16px;
    }

    .meta-grid {
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      margin-top: 18px;
    }

    .meta-item {
      padding: 14px;
      border-radius: 14px;
      background: rgba(192, 132, 87, 0.08);
    }

    .meta-item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .card-grid {
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      margin: 24px 0;
    }

    .metric-card {
      border-radius: 18px;
      padding: 18px;
      color: white;
      min-height: 120px;
    }

    .metric-card.cpu { background: linear-gradient(135deg, #ef8b74, var(--cpu)); }
    .metric-card.gpu { background: linear-gradient(135deg, #58b7ab, var(--gpu)); }
    .metric-card.npu { background: linear-gradient(135deg, #466a79, var(--npu)); }

    .metric-card .label {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .metric-card .value {
      margin-top: 14px;
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
      margin-bottom: 24px;
    }

    .chart {
      min-height: 340px;
    }

    .bar-chart {
      display: grid;
      gap: 18px;
      margin-top: 22px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 70px 1fr 90px;
      gap: 12px;
      align-items: center;
    }

    .bar-label {
      font-weight: 700;
    }

    .bar-track {
      height: 20px;
      border-radius: 999px;
      background: linear-gradient(90deg, #f4ede3 0%, #ede4d7 100%);
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
    }

    .bar-value {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      color: var(--muted);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--grid);
      text-align: left;
      vertical-align: top;
    }

    th {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .small {
      font-size: 13px;
      color: var(--muted);
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      color: var(--muted);
    }

    .empty {
      padding: 42px 20px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--grid);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.6);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero panel">
      <div>
        <h1>CPU vs GPU vs NPU</h1>
        <p>Load a JSON file exported by <code>TestNpu.py --json-out</code> to compare latency and throughput visually.</p>
      </div>
      <div class="toolbar">
        <label class="file-label">
          <input id="fileInput" type="file" accept=".json,application/json">
          Load JSON Report
        </label>
        <button class="button" id="loadSample" type="button">Load Sample Data</button>
      </div>
      <div class="status" id="status">No report loaded.</div>
    </section>

    <div id="content" class="empty">
      Export benchmark data first, for example:
      <pre>python TestNpu.py --model-type cnn --hint THROUGHPUT --num-requests 4 --batch 4 --json-out benchmark_results.json</pre>
    </div>
  </div>

  <script>
    const sampleReport = {
      openvino_devices: ["CPU", "GPU", "NPU"],
      config: {
        model_type: "cnn",
        batch: 4,
        features: 1024,
        layers: 6,
        channels: 3,
        height: 224,
        width: 224,
        dtype: "fp16",
        hint: "THROUGHPUT",
        num_requests: 4,
        warmup: 50,
        iterations: 200,
        repeats: 3
      },
      results: [
        {
          device: "CPU",
          avg_latency_ms: 8.2,
          throughput_fps: 121.6,
          elapsed_s: 1.64,
          hint: "THROUGHPUT",
          num_requests: 4,
          repeats: 3,
          warmup: 50,
          iterations: 200,
          runs: [
            { avg_latency_ms: 8.2, throughput_fps: 121.6 },
            { avg_latency_ms: 8.4, throughput_fps: 119.1 },
            { avg_latency_ms: 8.1, throughput_fps: 123.2 }
          ]
        },
        {
          device: "GPU",
          avg_latency_ms: 5.9,
          throughput_fps: 169.4,
          elapsed_s: 1.18,
          hint: "THROUGHPUT",
          num_requests: 4,
          repeats: 3,
          warmup: 50,
          iterations: 200,
          runs: [
            { avg_latency_ms: 5.8, throughput_fps: 172.4 },
            { avg_latency_ms: 5.9, throughput_fps: 169.4 },
            { avg_latency_ms: 6.0, throughput_fps: 166.1 }
          ]
        },
        {
          device: "NPU",
          avg_latency_ms: 6.7,
          throughput_fps: 149.1,
          elapsed_s: 1.34,
          hint: "THROUGHPUT",
          num_requests: 4,
          repeats: 3,
          warmup: 50,
          iterations: 200,
          runs: [
            { avg_latency_ms: 6.8, throughput_fps: 147.0 },
            { avg_latency_ms: 6.7, throughput_fps: 149.1 },
            { avg_latency_ms: 6.6, throughput_fps: 151.4 }
          ]
        }
      ]
    };

    const statusEl = document.getElementById("status");
    const contentEl = document.getElementById("content");
    const fileInput = document.getElementById("fileInput");
    const loadSample = document.getElementById("loadSample");

    const colors = {
      CPU: "var(--cpu)",
      GPU: "var(--gpu)",
      NPU: "var(--npu)"
    };

    function formatNumber(value, digits = 2) {
      return Number(value).toFixed(digits);
    }

    function deviceClass(device) {
      return (device || "").toLowerCase();
    }

    function bestLatency(results) {
      return [...results].sort((a, b) => a.avg_latency_ms - b.avg_latency_ms)[0];
    }

    function bestThroughput(results) {
      return [...results].sort((a, b) => b.throughput_fps - a.throughput_fps)[0];
    }

    function buildBars(results, key, inverse = false, unit = "") {
      const values = results.map((item) => item[key]);
      const max = Math.max(...values, 1);
      return results.map((item) => {
        const raw = item[key];
        const width = inverse ? (max / raw) ** -1 * 100 : (raw / max) * 100;
        return `
          <div class="bar-row">
            <div class="bar-label">${item.device}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${Math.max(width, 4)}%; background:${colors[item.device] || "var(--accent)"}"></div>
            </div>
            <div class="bar-value">${formatNumber(raw, key === "avg_latency_ms" ? 3 : 2)} ${unit}</div>
          </div>
        `;
      }).join("");
    }

    function buildConfig(report) {
      const cfg = report.config || {};
      const entries = [
        ["Model", cfg.model_type],
        ["Batch", cfg.batch],
        ["Input", cfg.model_type === "cnn" ? `${cfg.channels}x${cfg.height}x${cfg.width}` : `${cfg.features} features`],
        ["Hint", cfg.hint],
        ["Requests", cfg.num_requests],
        ["Iterations", cfg.iterations],
        ["Warmup", cfg.warmup],
        ["Repeats", cfg.repeats],
        ["DType", cfg.dtype]
      ];
      return entries.map(([label, value]) => `
        <div class="meta-item">
          <strong>${label}</strong>
          <span>${value}</span>
        </div>
      `).join("");
    }

    function buildResultsTable(results) {
      return results.map((result) => {
        const runs = (result.runs || []).map((run, index) =>
          `Run ${index + 1}: ${formatNumber(run.avg_latency_ms, 3)} ms / ${formatNumber(run.throughput_fps, 2)} FPS`
        ).join("<br>");
        return `
          <tr>
            <td><strong>${result.device}</strong></td>
            <td>${result.hint}</td>
            <td>${result.num_requests}</td>
            <td>${formatNumber(result.avg_latency_ms, 3)} ms</td>
            <td>${formatNumber(result.throughput_fps, 2)} FPS</td>
            <td class="small">${runs}</td>
          </tr>
        `;
      }).join("");
    }

    function render(report) {
      const results = report.results || [];
      if (!results.length) {
        contentEl.className = "empty";
        contentEl.innerHTML = "Report has no benchmark results.";
        return;
      }

      const latencyWinner = bestLatency(results);
      const throughputWinner = bestThroughput(results);

      contentEl.className = "";
      contentEl.innerHTML = `
        <section class="panel">
          <h2>Benchmark Configuration</h2>
          <p>This section shows the exact workload used to compare CPU, GPU, and NPU.</p>
          <div class="meta-grid">${buildConfig(report)}</div>
        </section>

        <section class="card-grid">
          <div class="metric-card ${deviceClass(latencyWinner.device)}">
            <div class="label">Best Latency</div>
            <div class="value">${latencyWinner.device}</div>
            <div>${formatNumber(latencyWinner.avg_latency_ms, 3)} ms median latency</div>
          </div>
          <div class="metric-card ${deviceClass(throughputWinner.device)}">
            <div class="label">Best Throughput</div>
            <div class="value">${throughputWinner.device}</div>
            <div>${formatNumber(throughputWinner.throughput_fps, 2)} FPS median throughput</div>
          </div>
        </section>

        <section class="chart-grid">
          <div class="panel chart">
            <h2>Median Latency</h2>
            <p>Lower is better. This reflects average time per inference request during the run.</p>
            <div class="bar-chart">${buildBars(results, "avg_latency_ms", false, "ms")}</div>
          </div>
          <div class="panel chart">
            <h2>Median Throughput</h2>
            <p>Higher is better. This reflects how many requests finish per second.</p>
            <div class="bar-chart">${buildBars(results, "throughput_fps", false, "FPS")}</div>
          </div>
        </section>

        <section class="panel">
          <h2>Detailed Runs</h2>
          <p>Each device shows the median score and the per-run measurements used to derive it.</p>
          <table>
            <thead>
              <tr>
                <th>Device</th>
                <th>Hint</th>
                <th>Requests</th>
                <th>Median Latency</th>
                <th>Median Throughput</th>
                <th>Runs</th>
              </tr>
            </thead>
            <tbody>${buildResultsTable(results)}</tbody>
          </table>
        </section>
      `;
    }

    fileInput.addEventListener("change", async (event) => {
      const [file] = event.target.files;
      if (!file) {
        return;
      }
      try {
        const text = await file.text();
        const report = JSON.parse(text);
        statusEl.textContent = `Loaded report: ${file.name}`;
        render(report);
      } catch (error) {
        statusEl.textContent = `Failed to load report: ${error.message}`;
      }
    });

    loadSample.addEventListener("click", () => {
      statusEl.textContent = "Loaded sample report.";
      render(sampleReport);
    });
  </script>
</body>
</html>
